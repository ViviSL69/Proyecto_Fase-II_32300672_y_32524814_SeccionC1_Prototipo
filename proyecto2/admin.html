<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Cafetín Central</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">Cafetín Central</a>
                <span class="ucv">UCV</span>
            </div>
            <div class="header-right">
                <div class="usuario-info">
                    <span class="usuario-label">Admin</span>
                    <span class="usuario-nombre">(GESTIÓN)</span>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html" class="cerrar-sesion">Cerrar Sesión</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="admin-c">
            <h2 style="border-bottom: none;">Panel de Administración</h2>
            <div class="admin-tabs">
                <button class="tab-button active" data-tab="productos-tab">Productos</button>
                <button class="tab-button" data-tab="resenas-tab">Reseñas</button>
            </div>
            <div id="productos-tab" class="tab-content active">
                <div class="form-container">
                    <h2>Agregar Producto</h2> 
                    <form id="formProducto" class="login-form">
                        <div class="form-group">
                            <label for="nombre">Nombre del producto</label>
                            <input type="text" id="nombre" placeholder="Ej: Café Americano" required>
                        </div>
                        <div class="form-group">
                            <label for="precio">Precio ($)</label>
                            <input type="number" id="precio" placeholder="Ej: 2.50" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="imagen">URL de la imagen</label>
                            <input type="text" id="imagen" placeholder="https://ejemplo.com/imagen.jpg" required>
                        </div>
                        <button type="submit" class="btn-login">Agregar Producto</button>
                    </form>
                </div>
                <div class="menu-container">
                    <h2>Menú Actual</h2> 
                    <div id="listaProductos" class="catalogo-grid"></div>
                </div>
            </div>
            <div id="resenas-tab" class="tab-content">
                <h2>Gestión de Reseñas</h2>
                <div id="listaResenas" class="resenas-container"></div>
            </div>
        </section>
    </main>
    <footer>
        <p>Cafetín Central - Universidad Central de Venezuela. Proyecto Académico</p>
    </footer>
    <script src="./js/productos.js"></script>
    <script src="./js/resenas.js"></script>
    <script src="./js/admin.js"></script>
</body>
</html>
