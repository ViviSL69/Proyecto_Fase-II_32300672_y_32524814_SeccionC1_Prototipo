<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetín Central - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
        <nav>
         <div class="logo">
             <a href="index.html">Cafetín Central</a>
              <span class="ucv">UCV</span>
         </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Inicio</a></li>
                <li><a href="menu.html" class="nav-link">Menú</a></li>
                <li><a href="login.html" class="nav-linkY">Iniciar Sesión</a></li>
            </ul>
        </nav>
    </header>


    <main>
        <section class="login-section">
            <h2>Iniciar Sesión</h2>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="nav-link">Ingresar</button>
            </form>
            <p id="error-message" class="error-message" style="display: none;">Usuario o contraseña incorrectos</p>
        </section>
    </main>

    <footer>
        <p>Cafetín Central - Universidad Central de Venezuela. Proyecto Académico</p>
    </footer>

    <script src="js/login.js"></script>
</body>
</html>
